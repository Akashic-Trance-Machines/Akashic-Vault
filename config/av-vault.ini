#
# av-vault.ini — Akashic Vault runtime configuration (read from SD at boot)
#

# ── Audio ─────────────────────────────────────────────────────────────────────
SoundDevice=i2s
SampleRate=48000
ChunkSize=256
ChannelsSwapped=0

# ── MIDI ──────────────────────────────────────────────────────────────────────
MIDIBaudRate=31250
USBMIDIEnabled=1
# Routing: thru = hardware TRS Thru; out mirrors generated/processed MIDI.
MIDIThru=1
MIDIClockSource=internal      ; internal | trs | usb
DefaultTempoBPM=120

# ── UI (4-row, nav-encoder mode: 1 nav + 4 value encoders) ─────────────────────
UIMode=4row
4RowNavMode=encoder
EncoderReversed=1

# I2C addresses (OLED + MCP23017) — see docs/HARDWARE_PLATFORM.md.
SSD1306LCDI2CAddress=0x3C
SSD1306LCDWidth=128
SSD1306LCDHeight=64
MCPI2CAddress=0x20
MCPResetGPIO=24
OLEDResetGPIO=23

# Encoder detents.
EncoderPulsePerStep=2

# Nav encoder (twist=scroll, click=back) + 4 value encoders (Port B quadrature).
4RowNavEncClickPin=GPA4
4RowNavEncChAPin=GPA5
4RowNavEncChBPin=GPA6
4RowEncClk1Pin=GPA3
4RowEncClk2Pin=GPA2
4RowEncClk3Pin=GPA1
4RowEncClk4Pin=GPA0
4RowEnc1ClkPin=GPB0
4RowEnc1DataPin=GPB1
4RowEnc2ClkPin=GPB2
4RowEnc2DataPin=GPB3
4RowEnc3ClkPin=GPB4
4RowEnc3DataPin=GPB5
4RowEnc4ClkPin=GPB6
4RowEnc4DataPin=GPB7

# ── Engine ────────────────────────────────────────────────────────────────────
FXSlots=3
Multitimbral=0                ; v1: single generator exposed (hook present)
